services:
  - type: web
    name: orbitdeck
    env: node
    buildCommand: npm ci --legacy-peer-deps && npm run build
    startCommand: npm start
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: orbitdeck-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://orbitdeck.onrender.com
      - key: LOG_LEVEL
        value: info

databases:
  - name: orbitdeck-db
    plan: starter